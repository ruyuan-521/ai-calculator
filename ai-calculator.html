<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>人工智能计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            padding: 15px;
        }

        .calculator-container {
            background: rgba(20, 20, 40, 0.95);
            border-radius: 16px;
            padding: 25px 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 200, 255, 0.1);
            border: 1px solid rgba(0, 200, 255, 0.2);
            max-width: 600px;
            width: 100%;
        }

        .title {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }

        .input-box {
            flex: 1;
            background: rgba(30, 30, 60, 0.8);
            border: 2px solid rgba(0, 200, 255, 0.3);
            border-radius: 10px;
            padding: 10px 14px;
            color: #00d4ff;
            font-size: 18px;
            font-weight: bold;
            outline: none;
            transition: all 0.3s;
            min-width: 0;
        }

        .input-box:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .input-box::placeholder {
            color: rgba(0, 212, 255, 0.4);
        }

        .calc-btn {
            background: linear-gradient(135deg, #00d4ff, #00a8e8);
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
            white-space: nowrap;
        }

        .calc-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.5);
        }

        .calc-btn:active {
            transform: translateY(0);
        }

        .calc-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress-container {
            margin-bottom: 15px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 16px;
            background: rgba(30, 30, 60, 0.8);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00cc66);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .progress-text {
            text-align: center;
            color: #00ff88;
            font-size: 13px;
            margin-top: 6px;
            font-weight: bold;
        }

        .result-text {
            text-align: center;
            color: #00d4ff;
            font-size: 15px;
            margin-bottom: 15px;
            min-height: 22px;
            font-weight: bold;
            line-height: 1.4;
        }

        .visual-section {
            display: none;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .limbs-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            flex-wrap: wrap;
        }

        .hand, .foot {
            width: 100px;
            height: 130px;
            position: relative;
        }

        .hand-svg, .foot-svg {
            width: 100%;
            height: 100%;
        }

        .finger-label {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
            opacity: 0;
            transform: scale(0);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* 颜色A - 红橙色 */
        .finger-label.color-a {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.5);
        }

        /* 颜色B - 蓝紫色 */
        .finger-label.color-b {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            box-shadow: 0 2px 8px rgba(108, 92, 231, 0.5);
        }

        /* 颜色C - 混合色 - 金黄色 */
        .finger-label.color-c {
            background: linear-gradient(135deg, #ffd93d, #ff9a3c);
            box-shadow: 0 2px 8px rgba(255, 217, 61, 0.5);
        }

        .finger-label.active {
            opacity: 1;
            transform: scale(1);
        }

        /* 手指位置 - 左手 */
        .hand-left .finger-label:nth-child(2) { top: 5px; left: 0px; }
        .hand-left .finger-label:nth-child(3) { top: -10px; left: 22px; }
        .hand-left .finger-label:nth-child(4) { top: -10px; left: 48px; }
        .hand-left .finger-label:nth-child(5) { top: 5px; left: 72px; }
        .hand-left .finger-label:nth-child(6) { top: 42px; left: 80px; }

        /* 手指位置 - 右手 */
        .hand-right .finger-label:nth-child(2) { top: 5px; left: 0px; }
        .hand-right .finger-label:nth-child(3) { top: -10px; left: 22px; }
        .hand-right .finger-label:nth-child(4) { top: -10px; left: 48px; }
        .hand-right .finger-label:nth-child(5) { top: 5px; left: 72px; }
        .hand-right .finger-label:nth-child(6) { top: 42px; left: 80px; }

        /* 脚趾位置 - 左脚 */
        .foot-left .finger-label:nth-child(2) { top: 8px; left: 5px; }
        .foot-left .finger-label:nth-child(3) { top: 0px; left: 26px; }
        .foot-left .finger-label:nth-child(4) { top: 0px; left: 48px; }
        .foot-left .finger-label:nth-child(5) { top: 8px; left: 68px; }
        .foot-left .finger-label:nth-child(6) { top: 38px; left: 76px; }

        /* 脚趾位置 - 右脚 */
        .foot-right .finger-label:nth-child(2) { top: 8px; left: 5px; }
        .foot-right .finger-label:nth-child(3) { top: 0px; left: 26px; }
        .foot-right .finger-label:nth-child(4) { top: 0px; left: 48px; }
        .foot-right .finger-label:nth-child(5) { top: 8px; left: 68px; }
        .foot-right .finger-label:nth-child(6) { top: 38px; left: 76px; }

        .footer {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 11px;
            color: rgba(0, 255, 136, 0.7);
        }

        .final-result {
            text-align: center;
            font-size: 24px;
            color: #00ff88;
            font-weight: bold;
            margin-top: 12px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            display: none;
        }

        @keyframes pulse-a {
            0%, 100% { transform: scale(1); box-shadow: 0 2px 8px rgba(255, 107, 107, 0.5); }
            50% { transform: scale(1.15); box-shadow: 0 4px 16px rgba(255, 107, 107, 0.8); }
        }

        @keyframes pulse-b {
            0%, 100% { transform: scale(1); box-shadow: 0 2px 8px rgba(108, 92, 231, 0.5); }
            50% { transform: scale(1.15); box-shadow: 0 4px 16px rgba(108, 92, 231, 0.8); }
        }

        @keyframes pulse-c {
            0%, 100% { transform: scale(1); box-shadow: 0 2px 8px rgba(255, 217, 61, 0.5); }
            50% { transform: scale(1.15); box-shadow: 0 4px 16px rgba(255, 217, 61, 0.8); }
        }

        .counting-a .finger-label.active.color-a {
            animation: pulse-a 0.5s ease infinite;
        }

        .counting-b .finger-label.active.color-b {
            animation: pulse-b 0.5s ease infinite;
        }

        .counting-c .finger-label.active.color-c {
            animation: pulse-c 0.5s ease infinite;
        }

        .section-title {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            text-align: center;
            margin-bottom: 8px;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }

        .legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }

        .legend-dot.dot-a {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
        }

        .legend-dot.dot-b {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
        }

        .legend-dot.dot-c {
            background: linear-gradient(135deg, #ffd93d, #ff9a3c);
        }

        /* 手机适配 */
        @media (max-width: 480px) {
            body {
                padding: 10px;
                align-items: flex-start;
            }

            .calculator-container {
                padding: 18px 14px;
                border-radius: 12px;
            }

            .title {
                font-size: 20px;
                margin-bottom: 15px;
                letter-spacing: 2px;
            }

            .input-section {
                gap: 8px;
            }

            .input-box {
                font-size: 16px;
                padding: 8px 12px;
            }

            .calc-btn {
                font-size: 14px;
                padding: 8px 14px;
            }

            .result-text {
                font-size: 13px;
            }

            .limbs-row {
                gap: 12px;
            }

            .hand, .foot {
                width: 80px;
                height: 105px;
            }

            .finger-label {
                width: 20px;
                height: 20px;
                font-size: 10px;
            }

            .hand-left .finger-label:nth-child(2) { top: 4px; left: 0px; }
            .hand-left .finger-label:nth-child(3) { top: -8px; left: 18px; }
            .hand-left .finger-label:nth-child(4) { top: -8px; left: 38px; }
            .hand-left .finger-label:nth-child(5) { top: 4px; left: 58px; }
            .hand-left .finger-label:nth-child(6) { top: 34px; left: 64px; }

            .hand-right .finger-label:nth-child(2) { top: 4px; left: 0px; }
            .hand-right .finger-label:nth-child(3) { top: -8px; left: 18px; }
            .hand-right .finger-label:nth-child(4) { top: -8px; left: 38px; }
            .hand-right .finger-label:nth-child(5) { top: 4px; left: 58px; }
            .hand-right .finger-label:nth-child(6) { top: 34px; left: 64px; }

            .foot-left .finger-label:nth-child(2) { top: 6px; left: 4px; }
            .foot-left .finger-label:nth-child(3) { top: 0px; left: 21px; }
            .foot-left .finger-label:nth-child(4) { top: 0px; left: 38px; }
            .foot-left .finger-label:nth-child(5) { top: 6px; left: 55px; }
            .foot-left .finger-label:nth-child(6) { top: 30px; left: 62px; }

            .foot-right .finger-label:nth-child(2) { top: 6px; left: 4px; }
            .foot-right .finger-label:nth-child(3) { top: 0px; left: 21px; }
            .foot-right .finger-label:nth-child(4) { top: 0px; left: 38px; }
            .foot-right .finger-label:nth-child(5) { top: 6px; left: 55px; }
            .foot-right .finger-label:nth-child(6) { top: 30px; left: 62px; }

            .final-result {
                font-size: 20px;
            }

            .legend {
                gap: 12px;
            }

            .legend-item {
                font-size: 11px;
            }

            .footer {
                font-size: 10px;
            }
        }

        @media (max-width: 360px) {
            .hand, .foot {
                width: 65px;
                height: 88px;
            }

            .finger-label {
                width: 18px;
                height: 18px;
                font-size: 9px;
            }

            .limbs-row {
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <h1 class="title">人工'智能'计算器</h1>
        
        <div class="input-section">
            <input type="text" class="input-box" id="expression" placeholder="例如: 5+8=" value="5+8=">
            <button class="calc-btn" id="calcBtn" onclick="startCalculate()">开始计算</button>
        </div>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">AI计算链路展开中...</div>
        </div>

        <div class="result-text" id="resultText"></div>

        <div class="visual-section" id="visualSection">
            <div>
                <div class="section-title" id="sectionTitle">AI计算链路展开完成，准备展示推演过程...</div>
                <div class="limbs-row" id="limbsRow">
                    <div class="hand hand-left" id="handLeft">
                        <svg class="hand-svg" viewBox="0 0 120 160">
                            <ellipse cx="60" cy="100" rx="35" ry="45" fill="#f5d0c5" stroke="#e0b0a0" stroke-width="2"/>
                            <ellipse cx="90" cy="85" rx="12" ry="20" fill="#f5d0c5" stroke="#e0b0a0" stroke-width="2" transform="rotate(-30 90 85)"/>
                            <ellipse cx="35" cy="50" rx="10" ry="30" fill="#f5d0c5" stroke="#e0b0a0" stroke-width="2"/>
                            <ellipse cx="60" cy="40" rx="10" ry="35" fill="#f5d0c5" stroke="#e0b0a0" stroke-width="2"/>
                            <ellipse cx="85" cy="50" rx="10" ry="30" fill="#f5d0c5" stroke="#e0b0a0" stroke-width="2"/>
                            <ellipse cx="105" cy="65" rx="8" ry="22" fill="#f5d0c5" stroke="#e0b0a0" stroke-width="2"/>
                        </svg>
                        <div class="finger-label" data-index="1">1</div>
                        <div class="finger-label" data-index="2">2</div>
                        <div class="finger-label" data-index="3">3</div>
                        <div class="finger-label" data-index="4">4</div>
                        <div class="finger-label" data-index="5">5</div>
                    </div>
                    <div class="hand hand-right" id="handRight">
                        <svg class="hand-svg" viewBox="0 0 120 160">
                            <ellipse cx="60" cy="100" rx="35" ry="45" fill="#f5d0c5" stroke="#e0b0a0" stroke-width="2"/>
                            <ellipse cx="30" cy="85" rx="12" ry="20" fill="#f5d0c5" stroke="#e0b0a0" stroke-width="2" transform="rotate(30 30 85)"/>
                            <ellipse cx="85" cy="50" rx="10" ry="30" fill="#f5d0c5" stroke="#e0b0a0" stroke-width="2"/>
                            <ellipse cx="60" cy="40" rx="10" ry="35" fill="#f5d0c5" stroke="#e0b0a0" stroke-width="2"/>
                            <ellipse cx="35" cy="50" rx="10" ry="30" fill="#f5d0c5" stroke="#e0b0a0" stroke-width="2"/>
                            <ellipse cx="15" cy="65" rx="8" ry="22" fill="#f5d0c5" stroke="#e0b0a0" stroke-width="2"/>
                        </svg>
                        <div class="finger-label" data-index="6">6</div>
                        <div class="finger-label" data-index="7">7</div>
                        <div class="finger-label" data-index="8">8</div>
                        <div class="finger-label" data-index="9">9</div>
                        <div class="finger-label" data-index="10">10</div>
                    </div>
                </div>
            </div>

            <div>
                <div class="limbs-row">
                    <div class="foot foot-left" id="footLeft">
                        <svg class="foot-svg" viewBox="0 0 120 160">
                            <ellipse cx="60" cy="100" rx="40" ry="50" fill="#f5d0c5" stroke="#e0b0a0" stroke-width="2"/>
                            <ellipse cx="35" cy="55" rx="12" ry="18" fill="#f5d0c5" stroke="#e0b0a0" stroke-width="2"/>
                            <ellipse cx="60" cy="45" rx="10" ry="16" fill="#f5d0c5" stroke="#e0b0a0" stroke-width="2"/>
                            <ellipse cx="82" cy="50" rx="9" ry="15" fill="#f5d0c5" stroke="#e0b0a0" stroke-width="2"/>
                            <ellipse cx="100" cy="60" rx="8" ry="14" fill="#f5d0c5" stroke="#e0b0a0" stroke-width="2"/>
                            <ellipse cx="110" cy="75" rx="7" ry="12" fill="#f5d0c5" stroke="#e0b0a0" stroke-width="2"/>
                        </svg>
                        <div class="finger-label" data-index="11">11</div>
                        <div class="finger-label" data-index="12">12</div>
                        <div class="finger-label" data-index="13">13</div>
                        <div class="finger-label" data-index="14">14</div>
                        <div class="finger-label" data-index="15">15</div>
                    </div>
                    <div class="foot foot-right" id="footRight">
                        <svg class="foot-svg" viewBox="0 0 120 160">
                            <ellipse cx="60" cy="100" rx="40" ry="50" fill="#f5d0c5" stroke="#e0b0a0" stroke-width="2"/>
                            <ellipse cx="85" cy="55" rx="12" ry="18" fill="#f5d0c5" stroke="#e0b0a0" stroke-width="2"/>
                            <ellipse cx="60" cy="45" rx="10" ry="16" fill="#f5d0c5" stroke="#e0b0a0" stroke-width="2"/>
                            <ellipse cx="38" cy="50" rx="9" ry="15" fill="#f5d0c5" stroke="#e0b0a0" stroke-width="2"/>
                            <ellipse cx="20" cy="60" rx="8" ry="14" fill="#f5d0c5" stroke="#e0b0a0" stroke-width="2"/>
                            <ellipse cx="10" cy="75" rx="7" ry="12" fill="#f5d0c5" stroke="#e0b0a0" stroke-width="2"/>
                        </svg>
                        <div class="finger-label" data-index="16">16</div>
                        <div class="finger-label" data-index="17">17</div>
                        <div class="finger-label" data-index="18">18</div>
                        <div class="finger-label" data-index="19">19</div>
                        <div class="finger-label" data-index="20">20</div>
                    </div>
                </div>
            </div>

            <div class="legend" id="legend" style="display:none;">
                <div class="legend-item"><div class="legend-dot dot-a"></div><span id="legendA">数字A</span></div>
                <div class="legend-item"><div class="legend-dot dot-b"></div><span id="legendB">数字B</span></div>
                <div class="legend-item"><div class="legend-dot dot-c"></div><span id="legendC">结果</span></div>
            </div>
        </div>

        <div class="final-result" id="finalResult"></div>

        <div class="footer">
            <span id="datetime"></span>
            <span>作者：编程码农工坊</span>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hour = String(now.getHours()).padStart(2, '0');
            const minute = String(now.getMinutes()).padStart(2, '0');
            const second = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('datetime').textContent = `${year}/${month}/${day} ${hour}:${minute}:${second}`;
        }
        updateTime();
        setInterval(updateTime, 1000);

        let isCalculating = false;

        function parseExpression(expr) {
            expr = expr.replace(/=/g, '');
            const match = expr.match(/(\d+)\s*([+\-×*/])\s*(\d+)/);
            if (!match) return null;
            return {
                a: parseInt(match[1]),
                b: parseInt(match[3]),
                op: match[2]
            };
        }

        function calculate(a, b, op) {
            switch(op) {
                case '+': return a + b;
                case '-': return a - b;
                case '×':
                case '*': return a * b;
                case '/': return b !== 0 ? a / b : NaN;
                default: return NaN;
            }
        }

        function getOpSymbol(op) {
            switch(op) {
                case '+': return '+';
                case '-': return '-';
                case '×':
                case '*': return '×';
                case '/': return '÷';
                default: return op;
            }
        }

        async function startCalculate() {
            if (isCalculating) return;
            
            const expression = document.getElementById('expression').value;
            const parsed = parseExpression(expression);
            
            if (!parsed) {
                alert('请输入正确的算式，例如：5+8=');
                return;
            }

            isCalculating = true;
            const btn = document.getElementById('calcBtn');
            btn.disabled = true;
            btn.textContent = '计算中...';

            // 重置
            document.getElementById('progressContainer').style.display = 'block';
            document.getElementById('visualSection').style.display = 'none';
            document.getElementById('finalResult').style.display = 'none';
            document.getElementById('legend').style.display = 'none';
            document.getElementById('resultText').textContent = '';
            document.querySelectorAll('.finger-label').forEach(el => {
                el.classList.remove('active', 'color-a', 'color-b', 'color-c');
            });
            document.getElementById('limbsRow').classList.remove('counting-a', 'counting-b', 'counting-c');

            const result = calculate(parsed.a, parsed.b, parsed.op);
            const numA = Math.min(parsed.a, 20);
            const numB = Math.min(parsed.b, 20);
            const totalResult = Math.min(Math.abs(Math.round(result)), 20);

            // 进度条
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            
            for (let i = 0; i <= 100; i += 5) {
                progressFill.style.width = i + '%';
                if (i < 30) {
                    progressText.textContent = 'AI计算链路展开中...';
                } else if (i < 60) {
                    progressText.textContent = '正在加载手指计数模型...';
                } else if (i < 90) {
                    progressText.textContent = '准备展示推演过程...';
                } else {
                    progressText.textContent = '推演完成！';
                }
                await sleep(100);
            }

            await sleep(500);

            // 显示手脚
            document.getElementById('progressContainer').style.display = 'none';
            document.getElementById('visualSection').style.display = 'flex';
            document.getElementById('legend').style.display = 'flex';

            // 设置图例
            const opSym = getOpSymbol(parsed.op);
            document.getElementById('legendA').textContent = `数字A (${parsed.a})`;
            document.getElementById('legendB').textContent = `数字B (${parsed.b})`;
            document.getElementById('legendC').textContent = `结果 (${result})`;

            await sleep(800);

            // === 阶段1：用红色数第一个数字 ===
            document.getElementById('sectionTitle').textContent = `正在数第一个数字 ${parsed.a}...`;
            document.getElementById('resultText').innerHTML = `<span style="color:#ff6b6b">正在数第一个数字 ${parsed.a}...</span>`;
            document.getElementById('limbsRow').classList.add('counting-a');

            for (let i = 1; i <= numA; i++) {
                const label = document.querySelector(`.finger-label[data-index="${i}"]`);
                if (label) {
                    label.classList.add('active', 'color-a');
                    document.getElementById('resultText').innerHTML = `<span style="color:#ff6b6b">数第一个数字... ${i}/${parsed.a}</span>`;
                    await sleep(500);
                }
            }

            document.getElementById('limbsRow').classList.remove('counting-a');
            await sleep(800);

            // === 阶段2：用蓝紫色数第二个数字 ===
            document.getElementById('sectionTitle').textContent = `正在数第二个数字 ${parsed.b}...`;
            document.getElementById('resultText').innerHTML = `<span style="color:#6c5ce7">正在数第二个数字 ${parsed.b}...</span>`;
            document.getElementById('limbsRow').classList.add('counting-b');

            for (let i = 1; i <= numB; i++) {
                const label = document.querySelector(`.finger-label[data-index="${i}"]`);
                if (label) {
                    label.classList.add('active', 'color-b');
                    document.getElementById('resultText').innerHTML = `<span style="color:#6c5ce7">数第二个数字... ${i}/${parsed.b}</span>`;
                    await sleep(500);
                }
            }

            document.getElementById('limbsRow').classList.remove('counting-b');
            await sleep(800);

            // === 阶段3：清除所有，用金黄色数结果 ===
            document.querySelectorAll('.finger-label').forEach(el => {
                el.classList.remove('active', 'color-a', 'color-b');
            });

            await sleep(500);

            document.getElementById('sectionTitle').textContent = `正在数结果 ${result}...`;
            document.getElementById('resultText').innerHTML = `<span style="color:#ffd93d">正在数结果 ${result}...</span>`;
            document.getElementById('limbsRow').classList.add('counting-c');

            for (let i = 1; i <= totalResult; i++) {
                const label = document.querySelector(`.finger-label[data-index="${i}"]`);
                if (label) {
                    label.classList.add('active', 'color-c');
                    document.getElementById('resultText').innerHTML = `<span style="color:#ffd93d">数结果... ${i}/${result}</span>`;
                    await sleep(500);
                }
            }

            document.getElementById('limbsRow').classList.remove('counting-c');

            // 显示最终结果
            await sleep(500);
            document.getElementById('finalResult').style.display = 'block';
            document.getElementById('finalResult').textContent = `${parsed.a} ${opSym} ${parsed.b} = ${result}`;
            document.getElementById('resultText').textContent = '计算完成！';
            document.getElementById('sectionTitle').textContent = '计算完成！';

            btn.disabled = false;
            btn.textContent = '开始计算';
            isCalculating = false;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        document.getElementById('expression').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                startCalculate();
            }
        });
    </script>
</body>
</html>
